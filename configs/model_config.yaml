# Chord Transformer — model and training hyperparameters
# Edit these freely; they are loaded by scripts/train_model.py

model:
  d_model: 256
  n_heads: 4
  n_layers: 4
  max_seq_len: 512
  dropout: 0.1

training:
  epochs: 20
  batch_size: 64
  lr: 1e-4
  warmup_steps: 1000
  grad_clip: 1.0
  device: cuda          # set to "cpu" if no GPU available

data:
  data_dir: data/processed
  augment_transpositions: true   # multiply training data by 12 via transposition
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

generation:
  temperature: 1.0
  top_k: 50
  top_p: 0.9
  repetition_penalty: 1.2

harmonization:
  alpha: 0.5            # 1.0 = pure template match, 0.0 = pure LM
  beam_width: 5
  top_n_candidates: 8   # chord candidates per melody segment
